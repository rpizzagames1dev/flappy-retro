<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Flappy Retro</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg">
    <div class="bg__grid"></div>
    <div class="bg__scan"></div>
    <div class="bg__glow"></div>
  </div>

  <main class="app">
    <header class="topbar pixel-frame">
      <div class="brand">
        <span class="logo-px" aria-hidden="true"></span>
        <div class="brand__text">
          <div class="brand__title">FLAPPY RETRO</div>
          <div class="brand__subtitle">solo / online • pixel ui</div>
        </div>
      </div>

      <div class="topbar__chips">
        <div class="chip">
          <span class="chip__label">BEST</span>
          <b id="bestTop">0</b>
        </div>
        <div class="chip">
          <span class="chip__label">COINS</span>
          <b id="coinsTop">0</b>
        </div>
        <div class="chip">
          <span class="chip__label">FPS</span>
          <b id="fpsTop">—</b>
        </div>
      </div>
    </header>

    <section class="grid">
      <aside class="panel pixel-frame">
        <h2 class="panel__title">CONTROLS</h2>
        <div class="panel__block">
          <div class="kline">
            <span class="key">SPACE</span>
            <span class="sep">/</span>
            <span class="key">CLICK</span>
            <span class="sep">/</span>
            <span class="key">TAP</span>
            <span class="desc">jump</span>
          </div>
        </div>

        <div class="pixel-art">
          <div class="sprite s1"></div>
          <div class="sprite s2"></div>
          <div class="sprite s3"></div>
        </div>
      </aside>

      <section class="game pixel-frame">
        <div class="game__header">
          <div class="badge">ARCADE WINDOW</div>
          <div class="hudline">
            <div class="chip chip--mini">
              <span class="chip__label">SCORE</span>
              <b id="scoreHud">0</b>
            </div>
            <div class="chip chip--mini">
              <span class="chip__label">BEST</span>
              <b id="bestHud">0</b>
            </div>
          </div>
        </div>

        <div class="viewport">
          <canvas id="gameCanvas" width="420" height="720"></canvas>

          <div id="mpBoard" class="mpBoard hidden">
            <div class="mpBoard__title">LOBBY / SCORE</div>
            <div id="mpBoardList" class="mpBoard__list"></div>
          </div>

          <!-- MENU -->
          <div id="menuOverlay" class="overlay">
            <div class="overlay__card pixel-frame overlay__card--wide">
              <div class="overlay__title">MAIN MENU</div>

              <div class="menuGrid">
                <button id="playSoloBtn" class="btn">PLAY SOLO</button>
                <button id="shopBtn" class="btn btn--alt">SHOP</button>
              </div>

              <div class="divider"></div>

              <div class="mpBox">
                <div class="mpHead">
                  <div class="mpTitle">ONLINE MULTIPLAYER</div>
                  <div id="mpStatus" class="mpStatus">—</div>
                </div>

                <div class="mpRow">
                  <label class="mpLabel" for="mpName">NAME</label>
                  <input id="mpName" class="mpInp" maxlength="14" placeholder="PLAYER" />
                </div>

                <div class="mpRow">
                  <label class="mpLabel" for="roomCodeInp">ROOM</label>
                  <input id="roomCodeInp" class="mpInp mpInp--code" maxlength="4" placeholder="ABCD" />
                </div>

                <div class="mpBtns">
                  <button id="createRoomBtn" class="pxbtn">CREATE</button>
                  <button id="joinRoomBtn" class="pxbtn">JOIN</button>
                  <button id="readyBtn" class="pxbtn pxbtn--alt">READY</button>
                </div>

                <div class="mpRow">
                  <label class="mpLabel" for="levelSel">LEVEL</label>
                  <select id="levelSel" class="mpSel">
                    <option value="classic">CLASSIC</option>
                    <option value="hard">HARD</option>
                    <option value="zen">ZEN</option>
                  </select>
                </div>

                <div class="mpRow">
                  <label class="mpLabel" for="mpSkinSel">YOUR SKIN</label>
                  <select id="mpSkinSel" class="mpSel"></select>
                </div>

                <div class="mpRow">
                  <label class="mpLabel" for="mpPipeSel">PIPE THEME (HOST)</label>
                  <select id="mpPipeSel" class="mpSel">
                    <option value="pipe_classic">PIPES: CLASSIC</option>
                    <option value="pipe_gold">PIPES: GOLD</option>
                    <option value="pipe_night">PIPES: NIGHT</option>
                  </select>
                </div>

              </div>

              <div id="assetWarn" class="warn muted hidden"></div>
            </div>
          </div>

          <!-- SHOP -->
          <div id="shopOverlay" class="overlay hidden">
            <div class="overlay__card pixel-frame overlay__card--wide overlay__card--shop">
              <div class="overlay__title">SHOP</div>

              <div class="shopTop">
                <div class="chip chip--mini">
                  <span class="chip__label">COINS</span>
                  <b id="coinsShop">0</b>
                </div>
                <div class="shopActions">
                  <button id="resetShopBtn" class="pxbtn pxbtn--ghost">RESET</button>
                  <button id="backFromShopBtn" class="pxbtn pxbtn--alt">BACK</button>
                </div>
              </div>


              <div id="shopList" class="shopList"></div>
            </div>
          </div>

          <!-- GAME OVER -->
          <div id="overOverlay" class="overlay hidden">
            <div class="overlay__card pixel-frame">
              <div class="overlay__title">GAME OVER</div>
              <div class="scorebox">
                <div class="row"><span>SCORE</span><b id="scoreOver">0</b></div>
                <div class="row"><span>BEST</span><b id="bestOver">0</b></div>
              </div>
              <div class="menuGrid">
                <button id="restartBtn" class="btn">RESTART</button>
                <button id="menuBtn" class="btn btn--alt">MENU</button>
              </div>
            </div>
          </div>
        </div>

        <div class="game__footer muted">Pixel UI • portrait canvas • no gifs</div>
      </section>

      <aside class="panel pixel-frame">
        <h2 class="panel__title">STATUS</h2>

        <div class="panel__block">
          <div class="statusLine">
            <span class="dot dot--green" aria-hidden="true"></span>
            <span class="statusText">RUNNING PERFECTLY</span>
          </div>
        </div>

        <div class="panel__block">
          <h3 class="mini">NOTES</h3>
        </div>
      </aside>
    </section>
  </main>

  <script defer src="flappy.js"></script>
</body>
</html>
